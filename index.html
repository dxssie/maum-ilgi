<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="마음일기"/>
<meta name="theme-color" content="#241a14"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<title>마음 일기</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#f5ede3;--paper:#fffcf8;--ink:#2c1f17;--ink-mid:#7a6558;
  --ink-light:#b8a99a;--ink-faint:#e9ddd4;
  --accent:#b86a47;--accent-light:#eeddd4;--accent-pale:#fdf2ec;
  --teal:#3d7d72;--teal-light:#cce8e4;
  --sidebar:#241a14;
  --r:10px;--rlg:14px;--rxl:20px;
}
html{font-size:16px}
body{background:var(--cream);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;line-height:1.75}
#root{min-height:100vh}
input,textarea{font-family:inherit;font-size:15px;color:var(--ink);background:var(--paper);border:1.5px solid var(--ink-faint);border-radius:var(--r);padding:10px 14px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(184,106,71,.08)}
textarea{resize:vertical;min-height:76px;line-height:1.8}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--ink-faint);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .38s cubic-bezier(.22,1,.36,1) forwards}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:36px;height:36px;border:3px solid var(--ink-faint);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}

/* ── 로그인 ── */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.login-logo{font-family:'Nanum Myeongjo',serif;font-size:40px;font-weight:700;color:var(--ink);letter-spacing:-.02em;margin-bottom:8px}
.login-sub{font-size:15px;color:var(--ink-mid);margin-bottom:52px;line-height:1.6}
.google-btn{display:flex;align-items:center;gap:12px;background:var(--paper);border:1.5px solid var(--ink-faint);border-radius:var(--rlg);padding:14px 32px;font-size:15px;color:var(--ink);transition:all .2s}
.google-btn:hover{border-color:var(--accent);transform:translateY(-1px)}

/* ── 앱 레이아웃 ── */
.app-shell{display:flex;min-height:100vh}

/* ── 사이드바 (PC) ── */
.sidebar{width:232px;flex-shrink:0;background:var(--sidebar);display:flex;flex-direction:column;position:fixed;height:100vh;top:0;left:0;z-index:200;overflow-y:auto}
.sb-top{padding:28px 22px 20px}
.sb-logo{font-family:'Nanum Myeongjo',serif;font-size:21px;font-weight:700;color:#f5ede3;letter-spacing:-.01em;margin-bottom:20px}
.sb-profile{display:flex;align-items:center;gap:10px}
.sb-av{width:34px;height:34px;border-radius:50%;background:rgba(184,106,71,.4);border:2px solid rgba(184,106,71,.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#f5ede3;flex-shrink:0;overflow:hidden;object-fit:cover}
.sb-name{font-size:13px;color:rgba(245,237,227,.88);font-weight:500;line-height:1.3}
.sb-email{font-size:11px;color:rgba(245,237,227,.35);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-div{height:1px;background:rgba(255,255,255,.06);margin:0}
.sb-nav{padding:10px 12px;flex:1}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;font-size:13px;color:rgba(245,237,227,.5);background:transparent;border:none;width:100%;text-align:left;transition:all .16s;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(245,237,227,.9)}
.nav-item.active{background:var(--accent);color:white}
.nav-ic{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-bot{padding:14px 22px 26px;margin-top:auto}
.logout-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:9px;font-size:13px;color:rgba(245,237,227,.4);width:100%;text-align:center;transition:all .18s}
.logout-btn:hover{background:rgba(255,255,255,.09);color:rgba(245,237,227,.8)}
.notif-dot{width:7px;height:7px;background:#c0392b;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle}

/* ── 메인 ── */
.main{margin-left:232px;padding:44px 52px;max-width:880px}
.page-header{margin-bottom:30px;padding-bottom:22px;border-bottom:1.5px solid var(--ink-faint)}
.page-title{font-family:'Nanum Myeongjo',serif;font-size:28px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.page-sub{font-size:13px;color:var(--ink-light);margin-top:5px}

/* ── 카드 ── */
.card{background:var(--paper);border:1.5px solid var(--ink-faint);border-radius:var(--rxl);padding:22px 26px;margin-bottom:14px;transition:box-shadow .2s}
.card-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-light);margin-bottom:12px;font-weight:500}

/* ── 감정 태그 ── */
.emotion-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.etag{padding:5px 13px;border-radius:20px;font-size:12px;border:1.5px solid var(--ink-faint);background:transparent;color:var(--ink-mid);transition:all .16s}
.etag:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-pale)}
.etag.selected{background:var(--accent);color:white;border-color:var(--accent)}

/* ── 강도 ── */
.intensity-wrap{display:flex;align-items:center;gap:12px}
.intensity-num{font-family:'Nanum Myeongjo',serif;font-size:38px;font-weight:700;color:var(--accent);min-width:50px;text-align:center}
input[type=range]{-webkit-appearance:none;appearance:none;height:5px;background:var(--ink-faint);border-radius:3px;border:none;padding:0;flex:1}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid var(--paper);box-shadow:0 0 0 2px var(--accent)}

/* ── 버튼 ── */
.save-btn{background:var(--ink);color:var(--cream);border:none;border-radius:var(--rlg);padding:15px;font-size:15px;transition:all .2s;width:100%;margin-top:6px;font-weight:500;letter-spacing:.02em}
.save-btn:hover{background:var(--accent);transform:translateY(-1px)}
.save-btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-sm{padding:7px 15px;border-radius:20px;font-size:13px;border:1.5px solid var(--ink-faint);background:transparent;color:var(--ink-mid);transition:all .16s;white-space:nowrap}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-pale)}
.btn-sm.primary{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.btn-sm.primary:hover{background:var(--accent);border-color:var(--accent)}
.btn-sm.danger:hover{border-color:#b03a2e;color:#b03a2e}

/* ── 일기카드 ── */
.entry-card{background:var(--paper);border:1.5px solid var(--ink-faint);border-radius:var(--rxl);padding:20px 24px;margin-bottom:12px;position:relative;transition:all .22s}
.entry-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 24px rgba(184,106,71,.1)}
.entry-date-label{font-size:11px;color:var(--ink-light);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.entry-emotions{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.entry-etag{font-size:11px;padding:2px 10px;border-radius:10px;background:var(--accent-pale);color:var(--accent);border:1px solid var(--accent-light)}
.entry-intensity-badge{position:absolute;top:20px;right:22px;font-size:11px;font-weight:700;background:var(--ink);color:var(--cream);border-radius:20px;padding:3px 10px}
.entry-field{margin-top:8px;font-size:13px;line-height:1.8;color:var(--ink)}
.entry-field-label{font-size:10px;color:var(--ink-light);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px;font-weight:500}
.entry-comfort{font-style:italic;padding:10px 14px;background:var(--accent-pale);border-left:3px solid var(--accent);font-size:13px;line-height:1.8;margin-top:9px;color:var(--ink-mid)}
.del-btn{background:none;border:none;color:var(--ink-light);font-size:18px;position:absolute;top:16px;right:56px;padding:4px 8px;border-radius:6px;display:none;transition:color .15s}
.entry-card:hover .del-btn{display:block}
.del-btn:hover{color:#b03a2e}
.badge-pub{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--teal-light);color:var(--teal);font-weight:500}
.badge-priv{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--ink-faint);color:var(--ink-light)}
.author-row{font-size:11px;color:var(--ink-light);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.av{width:22px;height:22px;border-radius:50%;background:var(--accent-pale);border:1.5px solid var(--accent-light);object-fit:cover}
.av-txt{width:22px;height:22px;border-radius:50%;background:var(--accent-pale);border:1.5px solid var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--accent)}

/* ── 통계 ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--paper);border:1.5px solid var(--ink-faint);border-radius:var(--rxl);padding:20px 22px;text-align:center}
.stat-num{font-family:'Nanum Myeongjo',serif;font-size:36px;font-weight:700;color:var(--accent)}
.stat-label{font-size:12px;color:var(--ink-mid);margin-top:5px}
.chart-card{background:var(--paper);border:1.5px solid var(--ink-faint);border-radius:var(--rxl);padding:26px 30px;margin-bottom:14px}
.chart-title{font-family:'Nanum Myeongjo',serif;font-size:16px;font-weight:700;color:var(--ink);margin-bottom:18px}

/* ── 달력 ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-day-name{text-align:center;font-size:11px;color:var(--ink-light);padding:9px 0;font-weight:500}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .14s;position:relative}
.cal-cell.today{border:2px solid var(--accent);font-weight:700}
.cal-cell.has-entry{background:var(--accent-pale);color:var(--accent);font-weight:700}
.cal-cell:hover{background:var(--ink-faint)}
.cal-cell.empty{cursor:default;pointer-events:none}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);position:absolute;bottom:5px}
.cal-header{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.cal-nav{background:none;border:1.5px solid var(--ink-faint);border-radius:9px;padding:7px 13px;font-size:13px;color:var(--ink);transition:all .14s}
.cal-nav:hover{border-color:var(--accent);color:var(--accent)}
.cal-month-title{font-family:'Nanum Myeongjo',serif;font-size:21px;font-weight:700;color:var(--ink)}

/* ── 친구 ── */
.friend-card{background:var(--paper);border:1.5px solid var(--ink-faint);border-radius:var(--rxl);padding:15px 20px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:all .18s}
.friend-card:hover{border-color:var(--accent)}
.friend-av{width:44px;height:44px;border-radius:50%;background:var(--accent-pale);border:2px solid var(--accent-light);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0;overflow:hidden}
.friend-av img{width:100%;height:100%;object-fit:cover}
.friend-info{flex:1;min-width:0}
.friend-name{font-size:14px;font-weight:500;color:var(--ink)}
.friend-email{font-size:11px;color:var(--ink-light);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.tab-bar{display:flex;gap:7px;margin-bottom:20px}
.tab-btn{padding:8px 18px;border-radius:20px;font-size:13px;border:1.5px solid var(--ink-faint);background:transparent;color:var(--ink-mid);transition:all .16s}
.tab-btn.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}

/* ── 토글 ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between}
.toggle{position:relative;width:46px;height:26px;cursor:pointer;flex-shrink:0}
.toggle input{opacity:0;position:absolute;width:0;height:0}
.tslider{position:absolute;inset:0;background:var(--ink-faint);border-radius:26px;transition:.2s}
.tslider:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle input:checked+.tslider{background:var(--teal)}
.toggle input:checked+.tslider:before{transform:translateX(20px)}

/* ── 기타 ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.empty-state{text-align:center;padding:70px 20px;color:var(--ink-light)}
.empty-icon{font-size:44px;margin-bottom:14px}

/* ── 모바일 하단탭 ── */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sidebar);border-top:1px solid rgba(255,255,255,.08);padding:6px 0 max(10px,env(safe-area-inset-bottom));z-index:300}
.mob-nav-inner{display:flex;justify-content:space-around}
.mob-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:rgba(245,237,227,.4);padding:4px 8px;font-size:10px;transition:color .15s}
.mob-btn.active{color:var(--accent)}
.mob-btn-ic{font-size:20px}
.mob-header{display:none;background:var(--sidebar);padding:12px 18px;position:sticky;top:0;z-index:200;align-items:center;gap:10px}
.mob-logo{font-family:'Nanum Myeongjo',serif;font-size:18px;font-weight:700;color:#f5ede3}

@media(max-width:720px){
  .sidebar{display:none}
  .mob-nav{display:block}
  .mob-header{display:flex}
  .main{margin-left:0;padding:20px 16px 90px}
  .page-title{font-size:22px}
  .two-col{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .entry-card:hover{transform:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
firebase.initializeApp({apiKey:"AIzaSyB9Qfy6smB8iGou0qzej-FJOu3mIpr0rS8",authDomain:"maum-ilgi.firebaseapp.com",projectId:"maum-ilgi",storageBucket:"maum-ilgi.firebasestorage.app",messagingSenderId:"239188621583",appId:"1:239188621583:web:e77f6bfc7b31e03593a67a"});
const auth=firebase.auth(),db=firebase.firestore();
const {createElement:h,useState,useEffect,useRef}=React;

const EL=['불안','슬픔','화남','외로움','기쁨','두려움','실망','수치심','무기력','설렘','감사','억울함','허탈함','뿌듯함','후회','그리움','지침','질투','당황','행복','평온','긴장','답답함','혼란','희망','외경심','부끄러움','속상함','서운함','허전함'];
const IL={1:'아주 약함',2:'약함',3:'조금',4:'어느 정도',5:'보통',6:'꽤 강함',7:'상당히',8:'매우 강함',9:'압도적',10:'극도로'};
const tod=()=>new Date().toISOString().split('T')[0];
const fmt=s=>{const d=new Date(s+'T00:00:00');return d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일'};
const ini=n=>{if(!n)return '?';const p=n.trim().split(' ');return p.length>1?p[0][0]+p[p.length-1][0]:n.slice(0,2)};
const Av=({photo,name,size=22,cls='av-txt'})=>photo
  ?h('img',{src:photo,className:'av',style:{width:size,height:size},alt:''})
  :h('div',{className:cls,style:{width:size,height:size,fontSize:size*0.42}},ini(name));

function LoginScreen(){
  const [ld,setLd]=useState(false);
  async function go(){setLd(true);try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())}catch{setLd(false)}}
  return h('div',{className:'login-wrap'},
    h('div',{className:'login-logo'},'마음 일기'),
    h('div',{className:'login-sub'},'나의 감정을 기록하고\n친구와 나누는 공간'),
    ld?h('div',{className:'spinner'}):h('button',{className:'google-btn',onClick:go},
      h('svg',{style:{width:20,height:20,flexShrink:0},viewBox:'0 0 24 24'},
        h('path',{fill:'#4285F4',d:'M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z'}),
        h('path',{fill:'#34A853',d:'M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z'}),
        h('path',{fill:'#FBBC05',d:'M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z'}),
        h('path',{fill:'#EA4335',d:'M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z'})
      ),'구글 계정으로 시작하기'
    )
  );
}

function EntryCard({entry,onDelete,showAuthor}){
  return h('div',{className:'entry-card fade-in'},
    onDelete&&h('button',{className:'del-btn',onClick:()=>onDelete(entry.id)},'×'),
    h('span',{className:'entry-intensity-badge'},entry.intensity+'/10'),
    showAuthor&&entry.authorName&&h('div',{className:'author-row'},h(Av,{photo:entry.authorPhoto,name:entry.authorName}),entry.authorName),
    h('div',{className:'entry-date-label'},fmt(entry.date),h('span',{className:entry.isPublic?'badge-pub':'badge-priv'},entry.isPublic?'공개':'나만 보기')),
    h('div',{className:'entry-emotions'},
      (entry.emotions||[]).map(e=>h('span',{key:e,className:'entry-etag'},e)),
      entry.duration&&h('span',{className:'entry-etag',style:{background:'var(--teal-light)',color:'var(--teal)',borderColor:'var(--teal-light)'}},entry.duration)
    ),
    entry.situation&&h('div',{className:'entry-field'},h('div',{className:'entry-field-label'},'상황'),entry.situation),
    entry.need&&h('div',{className:'entry-field'},h('div',{className:'entry-field-label'},'욕구'),entry.need),
    entry.past&&h('div',{className:'entry-field'},h('div',{className:'entry-field-label'},'과거'),entry.past),
    entry.comfort&&h('div',{className:'entry-comfort'},entry.comfort)
  );
}

function WritePage({user}){
  const [date,setDate]=useState(tod());
  const [sit,setSit]=useState('');const [ems,setEms]=useState([]);const [cust,setCust]=useState('');
  const [intens,setIntens]=useState(5);const [dur,setDur]=useState('');const [need,setNeed]=useState('');
  const [past,setPast]=useState('');const [comfort,setComfort]=useState('');
  const [pub,setPub]=useState(false);const [saving,setSaving]=useState(false);const [saved,setSaved]=useState(false);
  const togE=e=>setEms(p=>p.includes(e)?p.filter(x=>x!==e):[...p,e]);

function FriendsPage({user}){
  const [myData,setMyData]=useState(null);const [friends,setFriends]=useState([]);const [reqs,setReqs]=useState([]);
  const [email,setEmail]=useState('');const [result,setResult]=useState(null);const [srching,setSrching]=useState(false);const [tab,setTab]=useState('friends');

  }),[user.uid]);

    Promise.all(myData.friends.map(uid=>db.collection('users').doc(uid).get())).then(ds=>setFriends(ds.filter(d=>d.exists).map(d=>({id:d.id,...d.data()}))));
  },[myData?.friends?.join(',')]);

    b.update(db.collection('users').doc(from),{friends:firebase.firestore.FieldValue.arrayUnion(user.uid),sentRequests:firebase.firestore.FieldValue.arrayRemove(user.uid)});

          h('div',{className:'friend-info'},h('div',{className:'friend-name'},result.name),h('div',{className:'friend-email'},result.email)),

      h('button',{className:'tab-btn'+(tab==='reqs'?' active':''),onClick:()=>setTab('reqs')},'받은 요청',reqs.length>0&&h('span',{className:'notif-dot'}))

function CalendarPage({user}){
  const [entries,setEntries]=useState([]);
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());const [month,setMonth]=useState(today.getMonth());const [sel,setSel]=useState(null);
  useEffect(()=>db.collection('entries').where('uid','==',user.uid).orderBy('createdAt','desc').onSnapshot(s=>setEntries(s.docs.map(d=>({id:d.id,...d.data()})))),[user.uid]);
  const em={};entries.forEach(e=>{if(!em[e.date])em[e.date]=[];em[e.date].push(e)});
  const fd=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate();
  const cells=[];for(let i=0;i<fd;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  const ts=today.toISOString().split('T')[0];
  const dn=['일','월','화','수','목','금','토'];
  const prev=()=>{if(month===0){setYear(y=>y-1);setMonth(11)}else setMonth(m=>m-1);setSel(null)};
  const next=()=>{if(month===11){setYear(y=>y+1);setMonth(0)}else setMonth(m=>m+1);setSel(null)};

        h('div',{className:'cal-month-title'},year+'년 '+(month+1)+'월'),
        h('button',{className:'cal-nav',onClick:next},'→')
      ),
      h('div',{className:'cal-grid'},
        dn.map(d=>h('div',{key:d,className:'cal-day-name',style:{color:d==='일'?'var(--accent)':d==='토'?'var(--teal)':undefined}},d)),
        cells.map((d,i)=>{
          if(!d)return h('div',{key:'e'+i,className:'cal-cell empty'});
          const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const hasE=!!em[ds],iT=ds===ts,iS=d===sel;
          return h('div',{key:ds,className:'cal-cell'+(hasE?' has-entry':'')+(iT&&!iS?' today':''),
            style:iS?{background:'var(--accent)',color:'white',border:'2px solid var(--accent)'}:{},
            onClick:()=>setSel(d===sel?null:d)},d,hasE&&!iS&&h('div',{className:'cal-dot'}));
        })
      )
    ),
    sel&&h('div',{style:{marginTop:'10px'}},
      h('div',{className:'card-label',style:{marginBottom:'12px'}},fmt(sd)),
      (em[sd]||[]).length===0
        ?h('div',{style:{fontSize:'14px',color:'var(--ink-light)',padding:'10px 0'}},'이날의 기록이 없어요')
        :(em[sd]||[]).map(e=>h(EntryCard,{key:e.id,entry:e,onDelete:null,showAuthor:false}))
    )
  );
}

    {id:'stats',icon:'📊',label:'통계',short:'통계'},
  ];
  const setP=id=>setPage(id);
  return h('div',{className:'app-shell'},
    h('nav',{className:'sidebar'},
      h('div',{className:'sb-top'},
        h('div',{className:'sb-logo'},'마음 일기'),
        h('div',{className:'sb-profile'},
          u.photoURL
            ?h('img',{src:u.photoURL,className:'sb-av',alt:''})
            :h('div',{className:'sb-av'},ini(u.displayName)),
          h('div',null,
            h('div',{className:'sb-name'},u.displayName||''),
            h('div',{className:'sb-email'},u.email)
          )
        )
      ),
      h('div',{className:'sb-div'}),
      h('div',{className:'sb-nav'},
        nav.map(n=>h('button',{key:n.id,className:'nav-item'+(page===n.id?' active':''),onClick:()=>setP(n.id)},
          h('span',{className:'nav-ic'},n.icon),n.label,n.badge>0&&h('span',{className:'notif-dot'})
        ))
      ),
      h('div',{className:'sb-div'}),
      h('div',{className:'sb-bot'},h('button',{className:'logout-btn',onClick:()=>auth.signOut()},'로그아웃'))
    ),
    h('div',{style:{flex:1,display:'flex',flexDirection:'column',minWidth:0}},
      h('div',{className:'mob-header'},
        u.photoURL?h('img',{src:u.photoURL,className:'sb-av',style:{width:'28px',height:'28px'},alt:''}):h('div',{className:'sb-av',style:{width:'28px',height:'28px',fontSize:'11px'}},ini(u.displayName)),
        h('div',{className:'mob-logo'},'마음 일기')
      ),
      h('main',{className:'main'},
        page==='write'&&h(WritePage,{user:u}),
        page==='my'&&h(MyDiaryPage,{user:u}),
        page==='feed'&&h(FeedPage,{user:u,friendIds:fids}),
        page==='friends'&&h(FriendsPage,{user:u}),
        page==='calendar'&&h(CalendarPage,{user:u}),
        page==='stats'&&h(StatsPage,{user:u})
      ),
      h('nav',{className:'mob-nav'},
        h('div',{className:'mob-nav-inner'},
          nav.map(n=>h('button',{key:n.id,className:'mob-btn'+(page===n.id?' active':''),onClick:()=>setP(n.id)},
            h('span',{className:'mob-btn-ic'},n.icon),
            h('span',null,n.short),
            n.badge>0&&h('span',{className:'notif-dot'})
          ))
        )
      )
    )
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/maum-ilgi/sw.js').catch(()=>{})})}
</script>
</body>
</html>
