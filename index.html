<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>마음 일기</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f7f3ee;
    --warm-white: #fdfaf6;
    --ink: #2a2520;
    --ink-mid: #6b5f55;
    --ink-light: #a89d93;
    --ink-faint: #e8e0d8;
    --accent: #c4785a;
    --accent-light: #f0ddd4;
    --accent-pale: #faf0eb;
    --teal: #4a8b7f;
    --teal-light: #d4ece8;
    --amber: #c49a3a;
    --amber-light: #f5e8c8;
    --r: 12px;
    --r-lg: 18px;
  }
  html { font-size: 16px; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Gowun Dodum', serif;
    min-height: 100vh;
    line-height: 1.7;
  }
  #root { min-height: 100vh; }
  input, textarea, select {
    font-family: 'Gowun Dodum', serif;
    font-size: 15px;
    color: var(--ink);
    background: var(--warm-white);
    border: 1px solid var(--ink-faint);
    border-radius: var(--r);
    padding: 10px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 72px; line-height: 1.7; }
  button { font-family: 'Gowun Dodum', serif; cursor: pointer; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ink-faint); border-radius: 3px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.35s ease forwards; }

  .app-shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--ink);
    color: var(--cream);
    display: flex;
    flex-direction: column;
    padding: 32px 20px;
    position: fixed;
    height: 100vh;
    top: 0; left: 0;
    z-index: 100;
  }
  .sidebar-logo {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
    color: var(--warm-white);
  }
  .sidebar-tagline { font-size: 12px; color: var(--ink-light); margin-bottom: 40px; letter-spacing: 0.04em; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    border-radius: var(--r);
    font-size: 14px;
    color: var(--ink-light);
    background: transparent;
    border: none;
    width: 100%;
    text-align: left;
    transition: all 0.18s;
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: var(--warm-white); }
  .nav-item.active { background: var(--accent); color: white; }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-bottom { margin-top: auto; font-size: 12px; color: var(--ink-light); }
  .entry-count { font-size: 28px; font-weight: 500; color: var(--warm-white); }

  .main { margin-left: 220px; padding: 40px 48px; max-width: 1100px; }

  .page-header { margin-bottom: 32px; }
  .page-title { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 400; color: var(--ink); letter-spacing: -0.01em; }
  .page-sub { font-size: 14px; color: var(--ink-mid); margin-top: 4px; }

  .card {
    background: var(--warm-white);
    border: 1px solid var(--ink-faint);
    border-radius: var(--r-lg);
    padding: 24px 28px;
    margin-bottom: 16px;
  }
  .card-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 10px;
    font-family: 'Noto Serif KR', serif;
  }

  .emotion-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .etag {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    border: 1px solid var(--ink-faint);
    background: transparent;
    color: var(--ink-mid);
    transition: all 0.18s;
  }
  .etag:hover { border-color: var(--accent); color: var(--accent); }
  .etag.selected { background: var(--accent); color: white; border-color: var(--accent); }

  .intensity-wrap { display: flex; align-items: center; gap: 14px; }
  .intensity-num { font-size: 36px; font-weight: 500; color: var(--accent); min-width: 48px; text-align: center; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--ink-faint);
    border-radius: 2px; border: none; padding: 0;
    flex: 1;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid var(--warm-white);
    box-shadow: 0 0 0 1px var(--accent);
  }
  input[type=date] { width: auto; }

  .save-btn {
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: var(--r);
    padding: 14px 32px;
    font-size: 15px;
    letter-spacing: 0.04em;
    transition: all 0.18s;
    width: 100%;
    margin-top: 8px;
  }
  .save-btn:hover { background: var(--accent); }

  .entry-card {
    background: var(--warm-white);
    border: 1px solid var(--ink-faint);
    border-radius: var(--r-lg);
    padding: 20px 24px;
    margin-bottom: 12px;
    transition: all 0.2s;
    position: relative;
  }
  .entry-card:hover { border-color: var(--accent); }
  .entry-date-label { font-size: 12px; color: var(--ink-light); margin-bottom: 6px; }
  .entry-emotions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .entry-etag {
    font-size: 12px; padding: 3px 10px; border-radius: 12px;
    background: var(--accent-pale); color: var(--accent);
    border: 1px solid var(--accent-light);
  }
  .entry-intensity-badge {
    position: absolute; top: 20px; right: 24px;
    font-size: 12px; font-weight: 500;
    background: var(--ink); color: var(--cream);
    border-radius: 20px; padding: 3px 10px;
  }
  .entry-field { margin-top: 8px; font-size: 14px; line-height: 1.7; }
  .entry-field-label { font-size: 11px; color: var(--ink-light); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
  .entry-comfort {
    font-style: italic;
    padding: 10px 14px;
    background: var(--accent-pale);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--r) var(--r) 0;
    font-size: 14px;
    line-height: 1.7;
    margin-top: 8px;
  }
  .del-btn {
    background: none; border: none;
    color: var(--ink-light); font-size: 18px;
    position: absolute; top: 16px; right: 60px;
    padding: 4px 8px; border-radius: 6px;
    transition: color 0.15s;
    display: none;
  }
  .entry-card:hover .del-btn { display: block; }
  .del-btn:hover { color: #c0392b; }

  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--warm-white);
    border: 1px solid var(--ink-faint);
    border-radius: var(--r-lg);
    padding: 20px 24px;
    text-align: center;
  }
  .stat-num { font-size: 36px; font-weight: 500; color: var(--accent); }
  .stat-label { font-size: 13px; color: var(--ink-mid); margin-top: 4px; }

  .chart-card {
    background: var(--warm-white);
    border: 1px solid var(--ink-faint);
    border-radius: var(--r-lg);
    padding: 24px 28px;
    margin-bottom: 16px;
  }
  .chart-title { font-family: 'Noto Serif KR', serif; font-size: 16px; color: var(--ink); margin-bottom: 20px; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-name { text-align: center; font-size: 12px; color: var(--ink-light); padding: 8px 0; }
  .cal-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .cal-cell.today { border: 2px solid var(--accent); }
  .cal-cell.has-entry { background: var(--accent-pale); color: var(--accent); font-weight: 500; }
  .cal-cell:hover { background: var(--ink-faint); }
  .cal-cell.empty { cursor: default; }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); position: absolute; bottom: 4px; }
  .cal-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .cal-nav { background: none; border: 1px solid var(--ink-faint); border-radius: 8px; padding: 6px 12px; font-size: 14px; color: var(--ink); transition: all 0.15s; }
  .cal-nav:hover { border-color: var(--accent); color: var(--accent); }
  .cal-month-title { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 400; }

  .export-btns { display: flex; gap: 12px; margin-top: 24px; }
  .export-btn {
    flex: 1; padding: 14px;
    border-radius: var(--r);
    font-size: 14px; letter-spacing: 0.04em;
    border: 1px solid var(--ink-faint);
    background: var(--warm-white);
    color: var(--ink);
    transition: all 0.18s;
  }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); }

  .tab-bar { display: flex; gap: 8px; margin-bottom: 24px; }
  .tab-btn {
    padding: 8px 18px; border-radius: 20px;
    font-size: 14px; border: 1px solid var(--ink-faint);
    background: transparent; color: var(--ink-mid);
    transition: all 0.18s;
  }
  .tab-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-light); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  @media (max-width: 768px) {
    .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; padding: 16px; }
    .main { margin-left: 0; padding: 20px; }
    .app-shell { flex-direction: column; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const EMOTION_LIST = ['불안','슬픔','화남','외로움','기쁨','두려움','실망','수치심','무기력','설렘','감사','억울함','허탈함','뿌듯함'];
const STORAGE_KEY = 'maumilgi_entries_v1';

function loadEntries() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveEntries(entries) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function todayStr() {
  return new Date().toISOString().split('T')[0];
}

// ---- Write Page ----
function WritePage({ onSave }) {
  const [date, setDate] = useState(todayStr());
  const [situation, setSituation] = useState('');
  const [emotions, setEmotions] = useState([]);
  const [customEmotion, setCustomEmotion] = useState('');
  const [intensity, setIntensity] = useState(5);
  const [duration, setDuration] = useState('');
  const [need, setNeed] = useState('');
  const [past, setPast] = useState('');
  const [comfort, setComfort] = useState('');
  const [saved, setSaved] = useState(false);

  const intensityLabels = {1:'아주 약함',2:'약함',3:'조금',4:'어느 정도',5:'보통',6:'꽤 강함',7:'상당히',8:'매우 강함',9:'압도적',10:'극도로'};

  function toggleEmotion(e) {
    setEmotions(prev => prev.includes(e) ? prev.filter(x=>x!==e) : [...prev, e]);
  }

  function handleSave() {
    const allEmotions = [...emotions];
    if (customEmotion.trim()) allEmotions.push(customEmotion.trim());
    if (!situation.trim() && allEmotions.length === 0) return alert('상황 또는 감정을 입력해주세요.');
    const entry = { id: Date.now(), date, situation, emotions: allEmotions, intensity, duration, need, past, comfort };
    onSave(entry);
    setSaved(true);
    setTimeout(() => {
      setSaved(false);
      setSituation(''); setEmotions([]); setCustomEmotion('');
      setIntensity(5); setDuration(''); setNeed(''); setPast(''); setComfort('');
    }, 1500);
  }

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">오늘의 감정 기록</div>
        <div className="page-sub">지금 이 순간의 마음을 솔직하게 적어보세요</div>
      </div>

      <div className="card">
        <div className="card-label">날짜</div>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{width:'auto'}} />
      </div>

      <div className="card">
        <div className="card-label">상황</div>
        <textarea value={situation} onChange={e=>setSituation(e.target.value)} placeholder="어떤 일이 있었나요? 언제, 어디서, 누구와 함께였는지 떠올려보세요." />
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>
        <div className="card">
          <div className="card-label">느껴진 감정</div>
          <div className="emotion-tags">
            {EMOTION_LIST.map(e=>(
              <button key={e} className={`etag${emotions.includes(e)?' selected':''}`} onClick={()=>toggleEmotion(e)}>{e}</button>
            ))}
          </div>
          <input value={customEmotion} onChange={e=>setCustomEmotion(e.target.value)} placeholder="직접 입력..." style={{marginTop:'4px'}} />
        </div>

        <div className="card">
          <div className="card-label">감정의 강도</div>
          <div className="intensity-wrap">
            <span style={{fontSize:'13px',color:'var(--ink-light)'}}>1</span>
            <input type="range" min="1" max="10" value={intensity} onChange={e=>setIntensity(+e.target.value)} />
            <span style={{fontSize:'13px',color:'var(--ink-light)'}}>10</span>
          </div>
          <div style={{textAlign:'center',marginTop:'10px'}}>
            <span className="intensity-num">{intensity}</span>
            <span style={{fontSize:'14px',color:'var(--ink-mid)'}}> / 10 &nbsp;·&nbsp; {intensityLabels[intensity]}</span>
          </div>

          <div style={{marginTop:'20px',paddingTop:'16px',borderTop:'1px solid var(--ink-faint)'}}>
            <div className="card-label" style={{marginBottom:'8px'}}>감정이 머문 시간 (선택)</div>
            <input value={duration} onChange={e=>setDuration(e.target.value)} placeholder="예: 30분, 하루 종일..." />
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-label">내 욕구 — 그 순간 내가 진짜 원했던 것은?</div>
        <textarea value={need} onChange={e=>setNeed(e.target.value)} placeholder="예: 인정받고 싶었다, 혼자 있고 싶었다, 누군가와 연결되고 싶었다..." />
      </div>

      <div className="card">
        <div className="card-label">과거 비슷했던 상황</div>
        <textarea value={past} onChange={e=>setPast(e.target.value)} placeholder="언제, 어떤 상황에서 이런 감정을 느낀 적 있었나요?" />
      </div>

      <div className="card">
        <div className="card-label">스스로 다독이기</div>
        <textarea value={comfort} onChange={e=>setComfort(e.target.value)} placeholder="지금의 나에게 따뜻하게 건네고 싶은 말은? 예: 그럴 수 있어. 잘 버텼어." style={{minHeight:'90px'}} />
      </div>

      <button className="save-btn" onClick={handleSave}>
        {saved ? '✓ 저장되었어요' : '기록 저장하기'}
      </button>
    </div>
  );
}

// ---- List Page ----
function ListPage({ entries, onDelete }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const sorted = [...entries].sort((a,b)=>b.date.localeCompare(a.date));
  const filtered = sorted.filter(e => {
    if (search) {
      const q = search.toLowerCase();
      return [e.situation,e.need,e.past,e.comfort,...e.emotions].some(x=>x&&x.toLowerCase().includes(q));
    }
    return true;
  });

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">모든 기록</div>
        <div className="page-sub">총 {entries.length}개의 감정 일기</div>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="감정, 상황, 키워드로 검색..." style={{marginBottom:'20px'}} />
      {filtered.length === 0 ? (
        <div className="empty-state">
          <div className="empty-icon">🌿</div>
          <div>아직 기록이 없어요</div>
        </div>
      ) : filtered.map(entry => <EntryCard key={entry.id} entry={entry} onDelete={onDelete} />)}
    </div>
  );
}

function EntryCard({ entry, onDelete }) {
  return (
    <div className="entry-card fade-in">
      <button className="del-btn" onClick={()=>onDelete(entry.id)} title="삭제">×</button>
      <span className="entry-intensity-badge">{entry.intensity}/10</span>
      <div className="entry-date-label">{formatDate(entry.date)}</div>
      <div className="entry-emotions">
        {entry.emotions.map(e=><span key={e} className="entry-etag">{e}</span>)}
        {entry.duration && <span className="entry-etag" style={{background:'var(--teal-light)',color:'var(--teal)',borderColor:'var(--teal-light)'}}>{entry.duration}</span>}
      </div>
      {entry.situation && <div className="entry-field"><div className="entry-field-label">상황</div>{entry.situation}</div>}
      {entry.need && <div className="entry-field"><div className="entry-field-label">욕구</div>{entry.need}</div>}
      {entry.past && <div className="entry-field"><div className="entry-field-label">과거 비슷한 상황</div>{entry.past}</div>}
      {entry.comfort && <div className="entry-comfort">{entry.comfort}</div>}
    </div>
  );
}

// ---- Calendar Page ----
function CalendarPage({ entries }) {
  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());
  const [selected, setSelected] = useState(null);

  const entryMap = {};
  entries.forEach(e => {
    if (!entryMap[e.date]) entryMap[e.date] = [];
    entryMap[e.date].push(e);
  });

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const cells = [];
  for (let i=0; i<firstDay; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  const todayStr2 = today.toISOString().split('T')[0];
  const dayNames = ['일','월','화','수','목','금','토'];

  function prevMonth() { if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1); setSelected(null); }
  function nextMonth() { if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1); setSelected(null); }

  const selectedDate = selected ? `${year}-${String(month+1).padStart(2,'0')}-${String(selected).padStart(2,'0')}` : null;
  const selectedEntries = selectedDate ? (entryMap[selectedDate]||[]) : [];

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">달력으로 보기</div>
        <div className="page-sub">날짜를 클릭하면 그날의 기록을 볼 수 있어요</div>
      </div>
      <div className="card">
        <div className="cal-header">
          <button className="cal-nav" onClick={prevMonth}>←</button>
          <div className="cal-month-title">{year}년 {month+1}월</div>
          <button className="cal-nav" onClick={nextMonth}>→</button>
        </div>
        <div className="cal-grid">
          {dayNames.map(d=><div key={d} className="cal-day-name" style={{color:d==='일'?'var(--accent)':d==='토'?'var(--teal)':undefined}}>{d}</div>)}
          {cells.map((d,i)=>{
            if (!d) return <div key={`e${i}`} className="cal-cell empty" />;
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const hasEntry = !!entryMap[ds];
            const isToday = ds===todayStr2;
            const isSel = d===selected;
            return (
              <div key={ds} className={`cal-cell${hasEntry?' has-entry':''}${isToday?' today':''}${isSel?' today':''}`}
                onClick={()=>setSelected(d===selected?null:d)}
                style={isSel?{background:'var(--accent)',color:'white',borderColor:'var(--accent)'}:{}}>
                {d}
                {hasEntry && !isSel && <div className="cal-dot" />}
              </div>
            );
          })}
        </div>
      </div>
      {selected && (
        <div style={{marginTop:'8px'}}>
          <div className="card-label" style={{marginBottom:'12px'}}>{formatDate(selectedDate)}</div>
          {selectedEntries.length===0
            ? <div style={{color:'var(--ink-light)',fontSize:'14px',padding:'12px 0'}}>이날의 기록이 없어요</div>
            : selectedEntries.map(e=><EntryCard key={e.id} entry={e} onDelete={()=>{}} />)}
        </div>
      )}
    </div>
  );
}

// ---- Stats Page ----
function StatsPage({ entries }) {
  const chartRef = useRef(null);
  const lineRef = useRef(null);
  const chartInstance = useRef(null);
  const lineInstance = useRef(null);

  const emotionCount = {};
  entries.forEach(e => e.emotions.forEach(em => { emotionCount[em]=(emotionCount[em]||0)+1; }));
  const topEmotions = Object.entries(emotionCount).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const avgIntensity = entries.length ? (entries.reduce((s,e)=>s+e.intensity,0)/entries.length).toFixed(1) : 0;
  const thisMonth = entries.filter(e=>e.date.startsWith(new Date().toISOString().slice(0,7))).length;

  useEffect(()=>{
    if (!chartRef.current || topEmotions.length===0) return;
    if (chartInstance.current) chartInstance.current.destroy();
    chartInstance.current = new Chart(chartRef.current, {
      type: 'doughnut',
      data: {
        labels: topEmotions.map(([e])=>e),
        datasets: [{ data: topEmotions.map(([,c])=>c),
          backgroundColor: ['#c4785a','#4a8b7f','#c49a3a','#8b6fa8','#5a7ac4','#c45a7a','#5ac47a','#7ac4c4'],
          borderWidth: 0, hoverOffset: 6 }]
      },
      options: { plugins: { legend: { position:'right', labels:{ font:{family:'Gowun Dodum',size:13}, color:'#2a2520', padding:14 } } }, cutout:'60%' }
    });
    return ()=>{ if(chartInstance.current) chartInstance.current.destroy(); };
  }, [entries.length]);

  const last14 = [];
  for (let i=13;i>=0;i--) { const d=new Date(); d.setDate(d.getDate()-i); last14.push(d.toISOString().split('T')[0]); }
  const intensityByDay = last14.map(d=>{
    const es=entries.filter(e=>e.date===d); return es.length ? es.reduce((s,e)=>s+e.intensity,0)/es.length : null;
  });

  useEffect(()=>{
    if (!lineRef.current) return;
    if (lineInstance.current) lineInstance.current.destroy();
    lineInstance.current = new Chart(lineRef.current, {
      type: 'line',
      data: {
        labels: last14.map(d=>d.slice(5).replace('-','/')),
        datasets: [{ label:'감정 강도 평균', data: intensityByDay,
          borderColor:'#c4785a', backgroundColor:'rgba(196,120,90,0.08)',
          tension:0.4, fill:true, pointRadius:5, pointBackgroundColor:'#c4785a',
          pointBorderColor:'white', pointBorderWidth:2, spanGaps:true }]
      },
      options: {
        scales: {
          y: { min:1, max:10, grid:{ color:'rgba(0,0,0,0.05)' }, ticks:{ font:{family:'Gowun Dodum',size:12}, color:'#a89d93' } },
          x: { grid:{ display:false }, ticks:{ font:{family:'Gowun Dodum',size:11}, color:'#a89d93' } }
        },
        plugins: { legend:{ display:false } }
      }
    });
    return ()=>{ if(lineInstance.current) lineInstance.current.destroy(); };
  }, [entries.length]);

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">감정 통계</div>
        <div className="page-sub">나의 감정 패턴을 한눈에 살펴보세요</div>
      </div>
      <div className="stats-grid">
        <div className="stat-card"><div className="stat-num">{entries.length}</div><div className="stat-label">총 기록 수</div></div>
        <div className="stat-card"><div className="stat-num">{thisMonth}</div><div className="stat-label">이번 달 기록</div></div>
        <div className="stat-card"><div className="stat-num">{avgIntensity}</div><div className="stat-label">평균 감정 강도</div></div>
      </div>
      {entries.length===0 ? (
        <div className="empty-state"><div className="empty-icon">📊</div><div>기록이 쌓이면 통계가 나타나요</div></div>
      ) : (
        <>
          <div className="chart-card">
            <div className="chart-title">자주 느끼는 감정</div>
            <canvas ref={chartRef} height="200" />
          </div>
          <div className="chart-card">
            <div className="chart-title">최근 2주간 감정 강도 변화</div>
            <canvas ref={lineRef} height="180" />
          </div>
        </>
      )}
    </div>
  );
}

// ---- Export Page ----
function ExportPage({ entries }) {
  function exportText() {
    const sorted = [...entries].sort((a,b)=>b.date.localeCompare(a.date));
    const lines = sorted.map(e => [
      `📅 ${formatDate(e.date)}`,
      e.emotions.length ? `감정: ${e.emotions.join(', ')} (강도 ${e.intensity}/10)` : `강도: ${e.intensity}/10`,
      e.duration ? `머문 시간: ${e.duration}` : '',
      e.situation ? `상황: ${e.situation}` : '',
      e.need ? `욕구: ${e.need}` : '',
      e.past ? `과거 비슷한 상황: ${e.past}` : '',
      e.comfort ? `다독이기: "${e.comfort}"` : '',
      '─'.repeat(40)
    ].filter(Boolean).join('\n')).join('\n\n');
    const blob = new Blob([`마음 일기\n${'═'.repeat(40)}\n\n`+lines], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='마음일기.txt'; a.click();
  }

  function exportJson() {
    const blob = new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='마음일기_백업.json'; a.click();
  }

  function importJson(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (Array.isArray(data)) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); window.location.reload(); }
        else alert('올바른 형식이 아니에요.');
      } catch { alert('파일을 읽을 수 없어요.'); }
    };
    reader.readAsText(file);
  }

  return (
    <div className="fade-in">
      <div className="page-header">
        <div className="page-title">내보내기 & 백업</div>
        <div className="page-sub">기록을 저장하거나 다른 기기로 옮길 수 있어요</div>
      </div>
      <div className="card" style={{marginBottom:'16px'}}>
        <div className="card-label">텍스트로 내보내기</div>
        <p style={{fontSize:'14px',color:'var(--ink-mid)',marginBottom:'14px'}}>모든 기록을 읽기 쉬운 텍스트 파일(.txt)로 저장해요.</p>
        <button className="export-btn" onClick={exportText}>📄 .txt 파일로 다운로드</button>
      </div>
      <div className="card" style={{marginBottom:'16px'}}>
        <div className="card-label">JSON 백업</div>
        <p style={{fontSize:'14px',color:'var(--ink-mid)',marginBottom:'14px'}}>전체 데이터를 JSON 파일로 백업해요. 나중에 복원할 수 있어요.</p>
        <div style={{display:'flex',gap:'12px'}}>
          <button className="export-btn" onClick={exportJson}>💾 백업 파일 저장</button>
          <label className="export-btn" style={{textAlign:'center',cursor:'pointer'}}>
            📂 백업 불러오기
            <input type="file" accept=".json" onChange={importJson} style={{display:'none'}} />
          </label>
        </div>
      </div>
      <div className="card">
        <div className="card-label">저장 위치</div>
        <p style={{fontSize:'14px',color:'var(--ink-mid)'}}>기록은 이 브라우저의 로컬 스토리지에 저장돼요. 같은 브라우저에서 새로고침해도 유지되지만, 다른 기기로 옮기려면 JSON 백업을 이용하세요.</p>
      </div>
    </div>
  );
}

// ---- App Shell ----
export default function App() {
  const [entries, setEntries] = useState(loadEntries);
  const [page, setPage] = useState('write');

  function handleSave(entry) {
    const next = [entry, ...entries];
    setEntries(next); saveEntries(next);
  }
  function handleDelete(id) {
    if (!confirm('이 기록을 삭제할까요?')) return;
    const next = entries.filter(e=>e.id!==id);
    setEntries(next); saveEntries(next);
  }

  const navItems = [
    { id:'write', icon:'✏️', label:'오늘 기록' },
    { id:'list', icon:'📋', label:'모든 기록' },
    { id:'calendar', icon:'📅', label:'달력 보기' },
    { id:'stats', icon:'📊', label:'감정 통계' },
    { id:'export', icon:'💾', label:'내보내기' },
  ];

  return (
    <div className="app-shell">
      <nav className="sidebar">
        <div className="sidebar-logo">마음 일기</div>
        <div className="sidebar-tagline">감정을 기록하는 공간</div>
        {navItems.map(n=>(
          <button key={n.id} className={`nav-item${page===n.id?' active':''}`} onClick={()=>setPage(n.id)}>
            <span className="nav-icon">{n.icon}</span>{n.label}
          </button>
        ))}
        <div className="sidebar-bottom">
          <div className="entry-count">{entries.length}</div>
          <div>개의 감정 기록</div>
        </div>
      </nav>
      <main className="main">
        {page==='write' && <WritePage onSave={handleSave} />}
        {page==='list' && <ListPage entries={entries} onDelete={handleDelete} />}
        {page==='calendar' && <CalendarPage entries={entries} />}
        {page==='stats' && <StatsPage entries={entries} />}
        {page==='export' && <ExportPage entries={entries} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
